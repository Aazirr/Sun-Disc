services:
  - type: web
    name: sun-disc-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false

  - type: static
    name: sun-disc-frontend
    rootDir: frontend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
